<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKA UMKM</title>
    <style>
   .hero-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #FF6B35 0%, #FFA500 100%); /* Full Orange */
    padding: 80px 10%; /* padding kiri kanan 10% biar ada napas */
    color: white;
    width: 100%; /* full layar */
    margin: 0; /* hapus margin auto */
    border-radius: 0; /* hapus lengkungan bawah */
    gap: 30px;
    box-sizing: border-box;
}

.hero-text {
    flex: 1;
}

.hero-text h1 {
    font-size: 52px;
    line-height: 1.2;
    margin-bottom: 15px;
    font-family: 'Poppins', sans-serif;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2); /* biar teks nongol */
}

.hero-text h1 span {
    color: #FFF8F0;
}

.hero-text p {
    font-size: 18px;
    margin-bottom: 25px;
    opacity: 0.95;
}

.btn-pesan {
    background: white;
    color: #FF6B35;
    padding: 16px 35px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    font-size: 17px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
    display: inline-block;
}

.btn-pesan:hover {
    transform: scale(1.05);
    background: #FFF8F0;
}

.hero-image {
    flex: 1;
    text-align: center;
}

.hero-image img {
    width: 100%;
    max-width: 500px;
    filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
}

/* RESPONSIF HP */
@media (max-width: 768px) {
    .hero-banner {
        flex-direction: column-reverse;
        text-align: center;
        padding: 50px 20px;
    }
    .hero-text h1 {
        font-size: 34px;
    }

}
    </style>
</head>
<header></header>
<section class="hero-banner">
    <div class="hero-text">
        <h1>Selamat datang di <br><span>PKA UMKM</span></h1>
        <p>Kripik Singkong, Gurih & Halal. <br>Anda membeli,Kami pun senang</p>
        <a href="home.html" class="btn-pesan">Pesan Sekarang</a>
    </div>
    <div class="hero-image">
        <img src="home.jpg" alt="Toples Kripik Singkong Sabda Cemilan">
    </div>
</section>
<body>
    
</body>
</html>
