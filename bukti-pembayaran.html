<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Bukti Pembayaran - Sabda Cemilan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f5f5; padding: 20px; }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            text-align: center;
            padding: 25px 20px;
        }
        .header h2 { font-size: 22px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }

        .info-pesanan {
            background: #fff7ed;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ff6b6b;
        }
        .info-pesanan h3 { color: #ff6b6b; margin-bottom: 10px; font-size: 16px; }
        .info-pesanan p { margin: 5px 0; font-size: 14px; }
        .list-produk {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .list-produk pre {
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .form-bukti { padding: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: #333;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        #preview {
            max-width: 100%;
            margin-top: 10px;
            border-radius: 10px;
            display: none;
            border: 2px dashed #ddd;
        }
        .btn-kirim {
            width: 100%;
            padding: 14px;
            background: #25D366;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-kirim:hover { background: #1ebe5b; transform: translateY(-2px); }
        .note {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📸 Upload Bukti Pembayaran</h2>
        <p>Sabda Cemilan - Kripik & Jamu Herbal</p>
    </div>

    <div class="info-pesanan" id="infoPesanan">
        Memuat data pesanan...
    </div>

    <form id="formBukti" class="form-bukti">
        <div class="form-group">
            <label>Nama Pemesan *</label>
            <input type="text" id="nama" placeholder="Contoh: Budi Santoso" required>
        </div>

        <div class="form-group">
            <label>No. WhatsApp *</label>
            <input type="tel" id="nohp" placeholder="Contoh: 08123456789" required>
        </div>

        <div class="form-group">
            <label>Alamat Pengiriman *</label>
            <textarea id="alamat" placeholder="Alamat lengkap + patokan" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Upload Bukti Transfer *</label>
            <input type="file" id="bukti" accept="image/*" required>
            <img id="preview" alt="Preview Bukti">
        </div>

        <div class="form-group">
            <label>Catatan Tambahan</label>
            <textarea id="catatan" placeholder="Contoh: Tolong kirim hari Sabtu" rows="2"></textarea>
        </div>

        <button type="submit" class="btn-kirim">Kirim ke Admin via WhatsApp</button>
        <p class="note">Setelah klik, WA akan terbuka. Silakan lampirkan foto bukti transfer.</p>
    </form>
</div>

    const urlParams = new URLSearchParams(window.location.search);
    const metode = urlParams.get('metode') || '-';
