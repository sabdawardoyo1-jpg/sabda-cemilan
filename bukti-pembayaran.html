<!DOCTYPE html>
<html>
<head>
    <title>Bukti Bayar - Sabda Cemilan</title>
    <style>
        body { font-family: Poppins, sans-serif; background: #FFF8F0; padding: 20px; text-align: center; }
     .box { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { color: #FF6B35; }
        input, button, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; text-align: left; }
        button { background: #FF6B35; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:hover { background: #e85a28; }
        #preview { max-width: 100%; margin-top: 10px; border-radius: 10px; display: none; }
     .info { background:#FFF8F0; padding:15px; border-radius:10px; margin-bottom:15px; text-align: left; }
     .info pre { background: white; padding: 10px; border-radius: 5px; font-size: 13px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Kirim Bukti Pembayaran</h2>
        <p>Setelah transfer, upload bukti di bawah ya 👇</p>

        <div id="info-bayar" class="info"></div>

        <form id="buktiForm">
            <input type="text" id="nama" placeholder="Nama Pemesan" required>
            <input type="text" id="nohp" placeholder="No HP / WhatsApp" required>
            <textarea id="alamat" placeholder="saran masukan" rows="3" required></textarea>
            <input type="file" id="buktiBayar" accept="image/*" required>
            <img id="preview">
            <button type="submit">Kirim ke Admin via WhatsApp</button>
        </form>
        <p id="status"></p>
    </div>

<script>
const noAdmin = "628998628025"; // GANTI NO WA KAMU

// 1. Ambil data dari URL dan localStorage
const urlParams = new URLSearchParams(window.location.search);
const metode = urlParams.get('metode');
const total = urlParams.get('total');
const keranjang = JSON.parse(localStorage.getItem('pesananSabda')) || []; // AMBIL DARI SINI

// 2. Buat list pesanan + total qty
let listPesanan = '';
let totalQty = 0;
keranjang.forEach(item => {
    totalQty += item.jumlah;
    listPesanan += `- ${item.nama} x ${item.jumlah} = Rp ${(item.harga * item.jumlah).toLocaleString('id-ID')}\n`;
});

// 3. Tampilin di halaman
document.getElementById('info-bayar').innerHTML = `
    <p><b>Metode:</b> ${metode}</p>
    <p><b>Total Bayar:</b> Rp ${parseInt(total).toLocaleString('id-ID')}</p>
    <p><b>Total Item:</b> ${totalQty} Produk</p>
    <p><b>Detail Pesanan:</b></p>
    <pre>${listPesanan}</pre>
`;

// 4. Preview gambar
document.getElementById('buktiBayar').onchange = function(e){
    let reader = new FileReader();
    reader.onload = function(event){
        document.getElementById('preview').src = event.target.result;
        document.getElementById('preview').style.display = 'block';
    }
    reader.readAsDataURL(e.target.files[0]);
}

document.getElementById('buktiForm').onsubmit = async function(e) {
    e.preventDefault();
    document.getElementById('status').innerText = "Mengirim...";

    let nama = document.getElementById('nama').value;
    let nohp = document.getElementById('nohp').value;
    let alamat = document.getElementById('alamat').value;
    let file = document.getElementById('buktiBayar').files[0];

    // PESAN LENGKAP + LIST PESAN + JUMLAH
    let pesanWA = `🔔 *BUKTI BAYAR BARU* 🔔\n\n`;
    pesanWA += `*Data Pemesan*\n`;
    pesanWA += `Nama: ${nama}\n`;
    pesanWA += `No HP: ${nohp}\n`;
    pesanWA += `Alamat: ${alamat}\n\n`;
    pesanWA += `*Detail Pesanan*\n`;
    pesanWA += `Metode: ${metode}\n`;
    pesanWA += `Total Item: ${totalQty} Produk\n`;
    pesanWA += `Total Bayar: Rp ${parseInt(total).toLocaleString('id-ID')}\n\n`;
    pesanWA += `*Rincian:*\n${listPesanan}\n`;
    pesanWA += `Catatan: Pengiriman Sabtu/Minggu\n`;
    pesanWA += `Mohon segera diproses ya 🙏`;

    // KIRIM VIA FONNTE API - GAMBAR + PESAN
    let formData = new FormData();
    formData.append('target', noAdmin);
    formData.append('message', pesanWA);
    formData.append('file', file);

    try {
        let response = await fetch('https://api.fonnte.com/send', {
            method: 'POST',
            headers: { 'Authorization': 'ZqfkL2LdHfVoXa4K4cDN' }, // GANTI TOKEN KAMU
            body: formData
        });

        let result = await response.json();
        if(result.status) {
            document.getElementById('status').innerText = "✅ Bukti berhasil terkirim! Admin akan segera konfirmasi";
            localStorage.removeItem('pesananSabda'); // hapus data biar ga numpuk
            document.getElementById('buktiForm').reset();
            document.getElementById('preview').style.display = 'none';
        } else {
            document.getElementById('status').innerText = "❌ Gagal kirim: " + result.reason;
        }
    } catch(err) {
        document.getElementById('status').innerText = "❌ Error: " + err;
    }
}
</script>

<div style="text-align:center; padding:30px; background:#FFF9E6; border-radius:15px; margin:20px auto; max-width:500px;">
  <div style="font-size:50px;">🎉</div>
  <h2 style="color:#FF6B00;">Makasih Banyak Kaa! 🙏</h2>
  <p style="font-size:15px; color:#555;">
     Pesanan Sabda Cemilan kamu akan kami kirim di <b>Sabtu/Minggu</b> <br><br>
    Ditunggu yaa keripik renyahnya 🥳
  </p>
</div>
</body>
</html>
